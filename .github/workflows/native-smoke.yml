name: Native Smoke

on:
  workflow_dispatch:
  schedule:
    # Full native/fresh-install smoke is release evidence, not a per-push gate.
    # Keep it on a weekly cadence plus manual runs so normal PR pushes stay
    # fast while release promotion still has a reproducible matrix check.
    - cron: "17 3 * * 1"

concurrency:
  group: native-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  host-native-smoke:
    name: Native host smoke (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: linux-x64-gnu
            msvc_arch: amd64
          - runner: ubuntu-latest-arm
            target: linux-arm64-gnu
            msvc_arch: amd64
          - runner: macos-15-intel
            target: darwin-x64
            msvc_arch: amd64
          - runner: blacksmith-12vcpu-macos-15
            target: darwin-arm64
            msvc_arch: amd64
          - runner: blacksmith-32vcpu-windows-2025
            target: win32-x64-msvc
            msvc_arch: amd64
          - runner: windows-11-arm
            target: win32-arm64-msvc
            msvc_arch: arm64
    env:
      NODE_OPTIONS: "--disable-warning=DEP0040 --disable-warning=DEP0169"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1
        with:
          node-version-file: ".node-version"
          cache: true
          run-install: false
      - name: Setup MSVC toolchain (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1
        with:
          arch: ${{ matrix.msvc_arch }}
      # MoonBit's native installer does not support Darwin x64. This matrix
      # target only builds and smokes the Rust/N-API native package, so keep
      # darwin-x64 covered without installing MoonBit.
      - uses: ./.github/actions/setup-moonbit
        if: matrix.target != 'darwin-x64'
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: wild-linker/action@0bbbfa5df4380cab8e63cb8505a1ce65e1d10203 # v0.9.0
        if: runner.os == 'Linux'
        with:
          wild-version: "0.9.0"
      - uses: ./.github/actions/setup-rust-sticky-cache
        if: runner.os == 'Linux'
        with:
          key: native-smoke-${{ matrix.target }}
          cache-key-suffix: ${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Cargo.lock') }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        if: runner.os != 'Linux'
        with:
          shared-key: native-smoke-${{ matrix.target }}
          cache-workspace-crates: "true"
      - name: Install native package dependencies
        run: vp install --frozen-lockfile --prefer-offline --filter './npm/native...'
      - name: Build CLI
        run: cargo build --profile ci -p vize
      - name: Smoke CLI
        shell: bash
        run: |
          if [ -x target/ci/vize.exe ]; then
            target/ci/vize.exe --version
          else
            target/ci/vize --version
          fi
      - name: Build @vizejs/native
        run: vp run --filter './npm/native' build:ci
      - name: Smoke @vizejs/native
        run: node -e "const native = require('./npm/native'); if (typeof native.compileSfc !== 'function') throw new Error('compileSfc missing')"
      - name: Package-install smoke for host native package
        if: runner.os == 'Linux'
        run: node tools/npm/smoke-release-install.mjs --prepare-manifests npm/native

  fresh-install-smoke:
    name: Fresh install smoke (${{ matrix.platform.target }}, Node ${{ matrix.node-version }})
    runs-on: ${{ matrix.platform.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        node-version: ["22", "24"]
        # Linux musl targets are intentionally absent here: Ubuntu runners
        # provide GNU hosts, not native Alpine/musl hosts. Keep the
        # known-limitation policy in docs/content/stability.md in sync when
        # containerized musl tarball staging is added.
        platform:
          - runner: ubuntu-latest
            target: linux-x64-gnu
            msvc_arch: amd64
          - runner: ubuntu-latest-arm
            target: linux-arm64-gnu
            msvc_arch: amd64
          - runner: macos-15-intel
            target: darwin-x64
            msvc_arch: amd64
          - runner: blacksmith-12vcpu-macos-15
            target: darwin-arm64
            msvc_arch: amd64
          - runner: blacksmith-32vcpu-windows-2025
            target: win32-x64-msvc
            msvc_arch: amd64
          - runner: windows-11-arm
            target: win32-arm64-msvc
            msvc_arch: arm64
    env:
      NODE_OPTIONS: "--disable-warning=DEP0040 --disable-warning=DEP0169"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Select Node compatibility version
        shell: bash
        run: echo "${{ matrix.node-version }}" > .node-version.ci
      - uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1
        with:
          node-version-file: ".node-version.ci"
          cache: true
          run-install: false
      # MSVC env vars (INCLUDE, LIB, etc.) must be set at job scope, not just
      # inside the setup-moonbit composite action — `vp run … build` later in
      # the job invokes moonbit's `cc` integration through `generate:rule-types`
      # (vize's build script), and that subprocess needs the MSVC C headers to
      # be visible. host-native-smoke gets away without this because it never
      # builds the npm/cli package; fresh-install-smoke does.
      - name: Setup MSVC toolchain (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1
        with:
          arch: ${{ matrix.platform.msvc_arch }}
      # MoonBit's native installer does not support Darwin x64. This matrix
      # target does not invoke moon because npm/cli is packed directly below.
      - uses: ./.github/actions/setup-moonbit
        if: matrix.platform.target != 'darwin-x64'
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: wild-linker/action@0bbbfa5df4380cab8e63cb8505a1ce65e1d10203 # v0.9.0
        if: runner.os == 'Linux'
        with:
          wild-version: "0.9.0"
      - uses: ./.github/actions/setup-rust-sticky-cache
        if: runner.os == 'Linux'
        with:
          key: fresh-install-smoke-${{ matrix.platform.target }}-node-${{ matrix.node-version }}
          cache-key-suffix: ${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Cargo.lock') }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        if: runner.os != 'Linux'
        with:
          shared-key: fresh-install-smoke-${{ matrix.platform.target }}
          cache-workspace-crates: "true"
      - name: Install package dependencies
        shell: bash
        run: |
          vp install --frozen-lockfile --prefer-offline \
            --filter './npm/native...' \
            --filter './npm/cli...' \
            --filter './npm/builder/vite...'
      - name: Build @vizejs/native
        run: vp run --filter './npm/native' build:ci
      - name: Prepare native platform packages
        shell: bash
        working-directory: npm/native
        run: |
          vp exec napi create-npm-dirs
          vp exec napi pre-publish -t npm --no-gh-release --skip-optional-publish
          # `napi pre-publish --skip-optional-publish` does not move the host
          # platform's .node binary into its per-platform npm subdir. Without
          # that move, the per-platform tarball that the smoke test installs is
          # empty of the actual binding, and the umbrella package fails to load
          # at runtime. Copy the host's .node into the matching subdir so the
          # smoke test exercises a real install + runtime path.
          for binary in vize-vitrine.*.node; do
            [ -f "$binary" ] || continue
            target="${binary#vize-vitrine.}"
            target="${target%.node}"
            if [ -d "npm/$target" ]; then
              cp "$binary" "npm/$target/"
            fi
          done
      - name: Build npm runtime packages
        shell: bash
        run: |
          # Pack npm/cli directly instead of running its full `build` script,
          # which would also re-invoke `generate:rule-types` (a moonbit script
          # that shells out to `cl.exe`). The checked-in src/types/rules.ts is
          # the source of truth and is regenerated/verified on the test-scripts
          # job on Linux; the smoke matrix only needs the packed tarball, and
          # moonbit's `cc` integration does not currently honor the inherited
          # INCLUDE env on Windows even when ilammy/msvc-dev-cmd has set it,
          # which would otherwise block this matrix on every Windows runner.
          (cd npm/cli && vp pack)
          vp run --filter './npm/builder/vite' build
      - name: Fresh install and runtime smoke published tarballs
        shell: bash
        run: |
          node tools/npm/smoke-release-install.mjs --prepare-manifests --runtime-checks \
            npm/native npm/native/npm/* \
            npm/cli npm/builder/vite
