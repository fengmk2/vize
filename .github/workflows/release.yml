name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: 0
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PUBLISH_RETRY_LIMIT: 6
  PUBLISH_RETRY_DELAY: 10
  PUBLISH_RESOLUTION_RETRY_LIMIT: 24
  PUBLISH_RESOLUTION_RETRY_DELAY: 10
  NPM_TAG: ${{ contains(github.ref_name, '-alpha') && 'alpha' || contains(github.ref_name, '-beta') && 'beta' || contains(github.ref_name, '-rc') && 'rc' || 'latest' }}

jobs:
  plan-release-platforms:
    name: Plan release platforms
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      include_slow_platforms: ${{ steps.platforms.outputs.include_slow_platforms }}
      release_minor: ${{ steps.platforms.outputs.release_minor }}
      cli_matrix: ${{ steps.platforms.outputs.cli_matrix }}
      native_matrix: ${{ steps.platforms.outputs.native_matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Select release platforms
        id: platforms
        run: node tools/github/release-platforms.mjs github-output "${{ github.ref_name }}"

  # Build CLI binaries for all platforms
  build-cli:
    name: Build CLI - ${{ matrix.settings.target }}
    needs: plan-release-platforms
    runs-on: ${{ matrix.settings.host }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        settings: ${{ fromJSON(needs.plan-release-platforms.outputs.cli_matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-moonbit

      - name: Enable long paths (Windows)
        if: runner.os == 'Windows'
        run: git config --system core.longpaths true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Install Rust target
        run: rustup target add ${{ matrix.settings.target }}

      - name: Setup Wild linker (Linux)
        if: runner.os == 'Linux'
        uses: wild-linker/action@0bbbfa5df4380cab8e63cb8505a1ce65e1d10203 # v0.9.0
        with:
          wild-version: "0.9.0"

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.settings.target == 'aarch64-unknown-linux-gnu'
        run: moon run --target native - -- < tools/moon/scripts/github/install_cross_compile_tools.mbtx

      - name: Mount Rust sticky disks (Linux)
        if: runner.os == 'Linux'
        uses: ./.github/actions/setup-rust-sticky-cache
        with:
          key: release-cli-${{ matrix.settings.target }}
          cache-key-suffix: ${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Cargo.lock') }}

      - name: Cache Rust (non-Linux)
        if: runner.os != 'Linux'
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: release-cli-${{ matrix.settings.target }}
          cache-workspace-crates: "true"
          save-if: "false"

      - name: Tune Windows release profile
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "CARGO_PROFILE_RELEASE_LTO=thin" >> "$GITHUB_ENV"
          echo "CARGO_PROFILE_RELEASE_CODEGEN_UNITS=16" >> "$GITHUB_ENV"

      - name: Build CLI
        shell: bash
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release -p vize --target ${{ matrix.settings.target }}

      - name: Create archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: moon run --target native - -- ${{ matrix.settings.target }} ${{ matrix.settings.archive }} vize < tools/moon/scripts/github/create_cli_archive.mbtx

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: moon run --target native - -- ${{ matrix.settings.target }} ${{ matrix.settings.archive }} vize.exe < tools/moon/scripts/github/create_cli_archive.mbtx

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cli-${{ matrix.settings.target }}
          path: ${{ matrix.settings.archive }}
          if-no-files-found: error
          compression-level: 0

  # Package editor extensions for GitHub Releases and registry validation
  build-editor-extensions:
    name: Build Editor Extensions
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Vite+ and Node.js
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1
        with:
          node-version-file: ".node-version"
          cache: true
          run-install: false

      - name: Install JS dependencies
        run: vp install --workspace-root --frozen-lockfile --prefer-offline

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: ./.github/actions/setup-rust-sticky-cache
        with:
          key: release-tools
          cache-key-suffix: ${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Cargo.lock') }}

      - name: Package VS Code extension
        run: vp run --workspace-root package:vscode-extension

      - name: Check Zed extension
        run: vp run --workspace-root check:zed-extension

      - name: Package Zed extension source
        run: vp run --workspace-root package:zed-extension

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: editor-extensions
          path: |
            emacs-vize-extension.tar.gz
            helix-vize-extension.tar.gz
            editors/vscode/dist/vize.vsix
            nvim-vize-extension.tar.gz
            vim-vize-extension.tar.gz
            zed-vize-extension.tar.gz
          if-no-files-found: error
          compression-level: 0

  # Publish VS Code extension when VSCE_PAT is configured
  release-vscode-extension:
    name: Release VS Code extension
    runs-on: ubuntu-latest
    needs: build-editor-extensions
    timeout-minutes: 15
    environment: vscode-marketplace
    permissions:
      contents: read
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Vite+ and Node.js
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1
        with:
          node-version-file: ".node-version"
          run-install: false
      - uses: ./.github/actions/setup-moonbit

      - name: Cache pnpm store for VS Code extension tooling
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-vscode-release-${{ hashFiles('.node-version') }}-v1
          restore-keys: |
            ${{ runner.os }}-pnpm-vscode-release-

      - name: Download editor extension artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: editor-extensions
          path: editor-extension-artifacts

      - name: Skip publish when VSCE_PAT is absent
        if: env.VSCE_PAT == ''
        run: echo "VSCE_PAT is not configured; skipping VS Code Marketplace publish."

      - name: Publish VS Code extension
        if: env.VSCE_PAT != ''
        run: moon run --target native - -- editor-extension-artifacts/editors/vscode/dist/vize.vsix < tools/moon/scripts/publish_vscode_extension.mbtx

  # Build release npm packages once and reuse them across publish jobs
  build-release-packages:
    name: Build release npm packages
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Vite+ and Node.js
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1
        with:
          node-version-file: ".node-version"
          cache: true
          run-install: false
      - uses: ./.github/actions/setup-moonbit

      - name: Install package build dependencies
        run: moon run --target native - -- --filter './npm/cli...' --filter './npm/builder/vite...' --filter './npm/oxint...' --filter './npm/builder/unplugin...' --filter './npm/fresco...' --filter './npm/mcp-musea...' --filter './npm/builder/vite-musea...' --filter './npm/builder/rspack...' --filter './npm/framework/musea-nuxt...' --filter './npm/framework/nuxt...' < tools/moon/scripts/github/vp_install.mbtx

      - name: Build release npm packages
        run: moon run --target native - -- vp run --filter './npm/cli' build -- vp run --filter './npm/builder/vite' build -- vp run --filter './npm/oxint' build -- vp run --filter './npm/builder/unplugin' build -- vp run --filter './npm/fresco' build -- vp run --filter './npm/mcp-musea' build -- vp run --filter './npm/builder/vite-musea' build -- vp run --filter './npm/builder/vite-musea' build:gallery -- vp run --filter './npm/builder/rspack' build -- vp run --filter './npm/framework/musea-nuxt' build -- vp run --filter './npm/framework/nuxt' build < tools/moon/scripts/github/run_many.mbtx

      - name: Upload vize CLI package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-package-vize
          path: npm/cli
          if-no-files-found: error
          compression-level: 0

      - name: Upload Vite plugin artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-package-vite-plugin-vize
          path: npm/builder/vite
          if-no-files-found: error
          compression-level: 0

      - name: Upload Oxlint plugin artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-package-oxlint-plugin-vize
          path: npm/oxint
          if-no-files-found: error
          compression-level: 0

      - name: Upload unplugin artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-package-unplugin-vize
          path: npm/builder/unplugin
          if-no-files-found: error
          compression-level: 0

      - name: Upload Fresco artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-package-fresco
          path: npm/fresco
          if-no-files-found: error
          compression-level: 0

      - name: Upload Musea MCP server artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-package-musea-mcp-server
          path: npm/mcp-musea
          if-no-files-found: error
          compression-level: 0

      - name: Upload Musea Vite plugin artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-package-vite-plugin-musea
          path: npm/builder/vite-musea
          if-no-files-found: error
          compression-level: 0

      - name: Upload Rspack plugin artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-package-rspack-vize-plugin
          path: npm/builder/rspack
          if-no-files-found: error
          compression-level: 0

      - name: Upload Musea Nuxt artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-package-musea-nuxt
          path: npm/framework/musea-nuxt
          if-no-files-found: error
          compression-level: 0

      - name: Upload Nuxt artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-package-nuxt
          path: npm/framework/nuxt
          if-no-files-found: error
          compression-level: 0

  # Build WASM once on Blacksmith; the npm publish job only attaches provenance.
  build-wasm-package:
    name: Build @vizejs/wasm package
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-moonbit

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown

      - uses: ./.github/actions/setup-rust-sticky-cache
        with:
          key: release-wasm
          cache-key-suffix: ${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Cargo.lock') }}

      - name: Cache WASM package build
        id: cache-wasm
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: npm/wasm
          key: ${{ runner.os }}-release-wasm-${{ hashFiles('crates/**/*.rs', 'Cargo.lock', 'npm/wasm/package.json', 'npm/wasm/index.js', 'npm/wasm/index.d.ts', 'tools/moon/scripts/build_vize_wasm_package.mbtx') }}

      - name: Install wasm-bindgen-cli
        if: steps.cache-wasm.outputs.cache-hit != 'true'
        uses: taiki-e/install-action@184183c2401be73c3bf42c2e61268aa5855379c1 # v2
        with:
          tool: wasm-bindgen-cli@0.2.121

      - name: Build WASM
        if: steps.cache-wasm.outputs.cache-hit != 'true'
        run: moon run --target native - -- < tools/moon/scripts/build_vize_wasm_package.mbtx

      - name: Setup Vite+ and Node.js
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1
        with:
          node-version-file: ".node-version"
          run-install: false

      - name: Smoke @vizejs/wasm package
        run: node tools/npm/smoke-wasm-package.mjs npm/wasm

      - name: Upload WASM package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-package-vize-wasm
          path: npm/wasm
          if-no-files-found: error
          compression-level: 0

  # Build native bindings (vize-native + fresco-native) for all platforms
  build-native-all:
    name: Build Native - ${{ matrix.settings.target }}
    needs: plan-release-platforms
    runs-on: ${{ matrix.settings.host }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        settings: ${{ fromJSON(needs.plan-release-platforms.outputs.native_matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Enable long paths (Windows)
        if: runner.os == 'Windows'
        run: git config --system core.longpaths true

      - name: Setup Vite+ and Node.js
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1
        with:
          node-version-file: ".node-version"
          cache: true
          run-install: false
      - uses: ./.github/actions/setup-moonbit

      - name: Install dependencies
        run: vp install --frozen-lockfile --prefer-offline --filter './npm/native...' --filter './npm/fresco-native...'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Install Rust target
        run: rustup target add ${{ matrix.settings.target }}

      - name: Setup Wild linker (Linux)
        if: runner.os == 'Linux'
        uses: wild-linker/action@0bbbfa5df4380cab8e63cb8505a1ce65e1d10203 # v0.9.0
        with:
          wild-version: "0.9.0"

      - name: Mount Rust sticky disks (Linux)
        if: runner.os == 'Linux'
        uses: ./.github/actions/setup-rust-sticky-cache
        with:
          key: release-native-${{ matrix.settings.target }}
          cache-key-suffix: ${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Cargo.lock') }}

      - name: Cache Rust (non-Linux)
        if: runner.os != 'Linux'
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: release-native-${{ matrix.settings.target }}
          cache-workspace-crates: "true"
          save-if: "false"

      - name: Tune Windows release profile
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "CARGO_PROFILE_RELEASE_LTO=thin" >> "$GITHUB_ENV"
          echo "CARGO_PROFILE_RELEASE_CODEGEN_UNITS=16" >> "$GITHUB_ENV"

      - name: Setup Zig
        if: matrix.settings.cross_compile
        uses: goto-bus-stop/setup-zig@abea47f85e598557f500fa1fd2ab7464fcb39406 # v2

      - name: Clean native build outputs
        shell: bash
        run: moon run --target native - -- npm/native npm/fresco-native < tools/moon/scripts/github/clean_node_binaries.mbtx

      - name: Build vize-native
        shell: bash
        run: moon run --target native - -- npm/native ../../crates/vize_vitrine/Cargo.toml vize_vitrine ${{ matrix.settings.target }} ${{ matrix.settings.cross_compile == true && '--cross-compile' || '' }} < tools/moon/scripts/github/build_napi_package.mbtx

      - name: Collect vize-native artifact
        shell: bash
        run: moon run --target native - -- npm/native .artifacts/vize-native vize-native < tools/moon/scripts/github/collect_native_artifacts.mbtx

      - name: Upload vize-native artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bindings-${{ matrix.settings.target }}
          path: .artifacts/vize-native/*.node
          if-no-files-found: error
          compression-level: 0

      - name: Build fresco-native
        shell: bash
        run: moon run --target native - -- npm/fresco-native ../../crates/vize_fresco/Cargo.toml vize_fresco ${{ matrix.settings.target }} ${{ matrix.settings.cross_compile == true && '--cross-compile' || '' }} < tools/moon/scripts/github/build_napi_package.mbtx

      - name: Collect fresco-native artifact
        shell: bash
        run: moon run --target native - -- npm/fresco-native .artifacts/fresco-native fresco-native < tools/moon/scripts/github/collect_native_artifacts.mbtx

      - name: Upload fresco-native artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fresco-bindings-${{ matrix.settings.target }}
          path: .artifacts/fresco-native/*.node
          if-no-files-found: error
          compression-level: 0

  smoke-release-packages:
    name: Smoke release npm package installs
    runs-on: ubuntu-latest
    needs: [plan-release-platforms, build-release-packages, build-native-all]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Vite+ and Node.js
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1
        with:
          node-version-file: ".node-version"
          cache: true
          run-install: false
      - uses: ./.github/actions/setup-moonbit

      - name: Install native package tooling dependencies
        run: vp install --frozen-lockfile --prefer-offline --filter './npm/native...' --filter './npm/fresco-native...'

      - name: Download vize CLI package artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-package-vize
          path: npm/cli

      - name: Download Vite plugin artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-package-vite-plugin-vize
          path: npm/builder/vite

      - name: Download Oxlint plugin artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-package-oxlint-plugin-vize
          path: npm/oxint

      - name: Download unplugin artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-package-unplugin-vize
          path: npm/builder/unplugin

      - name: Download Fresco artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-package-fresco
          path: npm/fresco

      - name: Download Musea MCP server artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-package-musea-mcp-server
          path: npm/mcp-musea

      - name: Download Musea Vite plugin artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-package-vite-plugin-musea
          path: npm/builder/vite-musea

      - name: Download Rspack plugin artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-package-rspack-vize-plugin
          path: npm/builder/rspack

      - name: Download Musea Nuxt artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-package-musea-nuxt
          path: npm/framework/musea-nuxt

      - name: Download Nuxt artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-package-nuxt
          path: npm/framework/nuxt

      - name: Download vize native artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: bindings-*
          path: npm/native/artifacts

      - name: Download fresco native artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: fresco-bindings-*
          path: npm/fresco-native/artifacts

      - name: Apply slow platform release cadence
        run: node tools/github/release-platforms.mjs apply-cadence "${{ github.ref_name }}" npm/native/package.json npm/oxint/package.json

      - name: Prepare native package tarballs
        working-directory: npm/native
        run: |
          vp exec napi create-npm-dirs
          vp exec napi artifacts --output-dir artifacts
          vp exec napi pre-publish -t npm --no-gh-release --skip-optional-publish

      - name: Prepare Fresco native package tarball
        run: |
          moon run --target native - -- npm/fresco-native < tools/moon/scripts/github/clean_node_binaries.mbtx
          moon run --target native - -- npm/fresco-native/artifacts npm/fresco-native fresco-native < tools/moon/scripts/github/collect_native_artifacts.mbtx

      - name: Smoke install release package tarballs
        run: |
          node tools/npm/smoke-release-install.mjs --prepare-manifests --runtime-checks \
            npm/native npm/native/npm/* \
            npm/fresco-native \
            npm/cli \
            npm/builder/vite \
            npm/oxint \
            npm/builder/unplugin \
            npm/fresco \
            npm/mcp-musea \
            npm/builder/vite-musea \
            npm/builder/rspack \
            npm/framework/musea-nuxt \
            npm/framework/nuxt

  # npm Trusted Publishing/provenance currently rejects self-hosted runners.
  # Keep the publish edge on GitHub-hosted runners; build and smoke jobs stay on Blacksmith.
  # Publish native packages to npm (using Trusted Publishing / OIDC)
  release-npm-native:
    name: Release @vizejs/native to npm
    runs-on: ubuntu-24.04
    needs: [plan-release-platforms, build-native-all]
    timeout-minutes: 30
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Vite+ and Node.js
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1
        with:
          node-version-file: ".node-version"
          cache: true
          run-install: false
      - uses: ./.github/actions/setup-moonbit

      - name: Install dependencies
        run: vp install --frozen-lockfile --prefer-offline --filter './npm/native...'

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: bindings-*
          path: npm/native/artifacts

      - name: Apply slow platform release cadence
        run: node tools/github/release-platforms.mjs apply-cadence "${{ github.ref_name }}" npm/native/package.json

      - name: Create npm platform directories
        working-directory: npm/native
        run: vp exec napi create-npm-dirs

      - name: Move artifacts
        working-directory: npm/native
        run: vp exec napi artifacts --output-dir artifacts

      - name: Prepare for publish
        working-directory: npm/native
        run: vp exec napi pre-publish -t npm --no-gh-release --skip-optional-publish

      - name: List packages
        run: ls -R npm/native/npm/

      - name: Smoke install native package tarballs
        run: node tools/npm/smoke-release-install.mjs --prepare-manifests --runtime-checks npm/native npm/native/npm/*

      - name: Publish platform packages
        run: moon run --target native - -- npm/native/npm --provenance < tools/moon/scripts/publish_npm_package_dirs.mbtx

      - name: Publish
        run: moon run --target native - -- npm/native --provenance < tools/moon/scripts/publish_npm_package.mbtx

