  # Create GitHub Release with CLI binaries
  create-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-cli
      - release-vscode-extension
      - release-npm-native
      - release-npm-fresco-native
      - release-npm-wasm
      - smoke-release-packages
      - release-npm-cli
      - release-npm-vite-plugin
      - release-npm-oxlint-plugin
      - release-npm-unplugin
      - release-npm-fresco
      - release-npm-musea-mcp-server
      - release-npm-vite-plugin-musea
      - release-npm-rspack-plugin
      - release-npm-musea-nuxt
      - release-npm-nuxt
      - release-crates
    timeout-minutes: 20
    # `id-token: write` is required by sigstore/cosign-installer to mint the
    # keyless signing certificate, and by anchore/sbom-action when it uploads
    # the SBOM as a release asset.
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download CLI artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: cli-*
          path: cli-artifacts
          merge-multiple: true

      - name: Download editor extension artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: editor-extensions
          path: editor-extension-artifacts

      - name: List CLI artifacts
        run: ls -la cli-artifacts/

      - name: List editor extension artifacts
        run: find editor-extension-artifacts -maxdepth 5 -type f | sort

      # SBOM: generate one SBOM per source-of-truth artifact set so adopters
      # can audit transitive dependencies for a release tag without rebuilding.
      # CycloneDX 1.5 JSON is the lingua franca for SCA tooling (Snyk, Trivy,
      # Grype, GitHub Dependency Graph). SPDX is generated by the same action
      # when adopters need an OSS-license-focused view.
      - name: Generate workspace SBOM (CycloneDX)
        uses: anchore/sbom-action@61119d458adab75f756bc0b9e4bde25725f86a7a # v0.17.8
        with:
          artifact-name: vize-${{ github.ref_name }}-cyclonedx.sbom.json
          format: cyclonedx-json
          output-file: vize-${{ github.ref_name }}-cyclonedx.sbom.json
          upload-artifact: false

      - name: Generate workspace SBOM (SPDX)
        uses: anchore/sbom-action@61119d458adab75f756bc0b9e4bde25725f86a7a # v0.17.8
        with:
          artifact-name: vize-${{ github.ref_name }}-spdx.sbom.json
          format: spdx-json
          output-file: vize-${{ github.ref_name }}-spdx.sbom.json
          upload-artifact: false

      # Cosign keyless signing via Sigstore. The OIDC token issued to the
      # workflow stands in for a long-lived private key, and the resulting
      # certificate + signature live in the public Rekor transparency log.
      # Each .tar.gz / .zip / .vsix gets a detached `.sig` and `.pem` so
      # adopters can verify with `cosign verify-blob --certificate-identity ...`.
      - name: Install cosign
        uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0
        with:
          cosign-release: v2.4.1

      # SHA-256 sums are the simplest integrity check downstream tools
      # (the VS Code extension's pre-execution download) can verify
      # without pulling in cosign or sigstore-verify libraries. Cosign
      # remains the source of truth via the bundle below; the .sha256
      # files are an easy-to-verify hash pin. (#969)
      - name: Generate SHA-256 checksums for release artifacts
        run: |
          for artifact in \
            cli-artifacts/*.tar.gz \
            cli-artifacts/*.zip \
            editor-extension-artifacts/editors/vscode/dist/*.vsix \
            editor-extension-artifacts/*.tar.gz; do
            if [ -f "$artifact" ]; then
              echo "Hashing $artifact"
              ( cd "$(dirname "$artifact")" && sha256sum "$(basename "$artifact")" ) > "${artifact}.sha256"
            fi
          done

      - name: Sign release artifacts (keyless)
        env:
          COSIGN_YES: "true"
        run: |
          for artifact in \
            cli-artifacts/*.tar.gz \
            cli-artifacts/*.zip \
            editor-extension-artifacts/editors/vscode/dist/*.vsix \
            editor-extension-artifacts/*.tar.gz \
            vize-${{ github.ref_name }}-cyclonedx.sbom.json \
            vize-${{ github.ref_name }}-spdx.sbom.json; do
            if [ -f "$artifact" ]; then
              echo "Signing $artifact"
              cosign sign-blob --yes \
                --bundle "${artifact}.cosign.bundle" \
                --output-certificate "${artifact}.pem" \
                --output-signature "${artifact}.sig" \
                "$artifact"
            fi
          done

      - name: Create Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
          draft: false
          overwrite_files: true
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          files: |
            cli-artifacts/*.tar.gz
            cli-artifacts/*.zip
            editor-extension-artifacts/editors/vscode/dist/*.vsix
            editor-extension-artifacts/*.tar.gz
            vize-${{ github.ref_name }}-cyclonedx.sbom.json
            vize-${{ github.ref_name }}-spdx.sbom.json
            cli-artifacts/*.sha256
            cli-artifacts/*.sig
            cli-artifacts/*.pem
            cli-artifacts/*.cosign.bundle
            editor-extension-artifacts/**/*.sha256
            editor-extension-artifacts/**/*.sig
            editor-extension-artifacts/**/*.pem
            editor-extension-artifacts/**/*.cosign.bundle
            vize-${{ github.ref_name }}-*.sig
            vize-${{ github.ref_name }}-*.pem
            vize-${{ github.ref_name }}-*.cosign.bundle

  # Publish vize CLI npm package (using Trusted Publishing / OIDC)
  # Native bindings are distributed via @vizejs/native-* optionalDependencies (NAPI-RS)
  release-npm-cli:
    name: Release vize CLI to npm
    runs-on: ubuntu-24.04
    needs: [build-release-packages, release-npm-native, smoke-release-packages]
    timeout-minutes: 15
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Vite+ and Node.js
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1
        with:
          node-version-file: ".node-version"
          run-install: false
      - uses: ./.github/actions/setup-moonbit

      - name: Download prebuilt packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-package-vize
          path: npm/cli

      - name: Inject native binding package versions
        run: moon run --target native - -- npm/cli/package.json --print < tools/moon/scripts/inject_native_optional_deps.mbtx

      - name: Publish vize CLI package
        run: moon run --target native - -- npm/cli --provenance < tools/moon/scripts/publish_npm_package.mbtx
