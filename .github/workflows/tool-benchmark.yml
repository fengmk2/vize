name: Tool Benchmark

on:
  workflow_dispatch:
    inputs:
      file_count:
        description: Generated SFC files for compile/lint/fmt benchmarks
        required: true
        default: "15000"
      check_file_count:
        description: Generated SFC files for vue-tsc/Vize check benchmarks
        required: true
        default: "500"
      vite_file_count:
        description: Generated SFC files imported by the Vite benchmark entry
        required: true
        default: "1000"
      nuxt_file_count:
        description: Generated SFC files imported by the Nuxt benchmark app
        required: true
        default: "500"
      large_blocks:
        description: Repeated template blocks in the large single-SFC benchmark
        required: true
        default: "900"
      runs:
        description: Measured runs per variant
        required: true
        default: "5"
      warmups:
        description: Warmup runs per variant
        required: true
        default: "1"
      commit_results:
        description: Commit the generated docs benchmark snapshot back to the branch
        required: true
        type: boolean
        default: false
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  schedule:
    # A full tool benchmark is far too heavy (75 min) to run on every push to
    # main, so a scheduled run publishes benchmark artifacts on a fixed cadence.
    # Committed baseline refreshes must go through a non-main branch because
    # main is protected by required status checks.
    - cron: "41 5 * * 1"

concurrency:
  group: tool-benchmark-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  VIZE_TOOL_BENCH_FILE_COUNT: ${{ github.event_name == 'workflow_dispatch' && inputs.file_count || '3000' }}
  VIZE_TOOL_BENCH_CHECK_FILE_COUNT: ${{ github.event_name == 'workflow_dispatch' && inputs.check_file_count || '500' }}
  VIZE_TOOL_BENCH_VITE_FILE_COUNT: ${{ github.event_name == 'workflow_dispatch' && inputs.vite_file_count || '1000' }}
  VIZE_TOOL_BENCH_NUXT_FILE_COUNT: ${{ github.event_name == 'workflow_dispatch' && inputs.nuxt_file_count || '250' }}
  VIZE_TOOL_BENCH_LARGE_BLOCKS: ${{ github.event_name == 'workflow_dispatch' && inputs.large_blocks || '300' }}
  VIZE_TOOL_BENCH_RUNS: ${{ github.event_name == 'workflow_dispatch' && inputs.runs || '3' }}
  VIZE_TOOL_BENCH_WARMUPS: ${{ github.event_name == 'workflow_dispatch' && inputs.warmups || '1' }}

jobs:
  tool-benchmark:
    name: tool-benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 75
    permissions:
      contents: read
    steps:
      - name: Checkout benchmark commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: wild-linker/action@0bbbfa5df4380cab8e63cb8505a1ce65e1d10203 # v0.9.0
        with:
          wild-version: "0.9.0"

      - uses: ./.github/actions/setup-rust-sticky-cache
        with:
          key: tool-benchmark
          cache-key-suffix: ${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Cargo.lock') }}

      - uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1
        with:
          node-version-file: ".node-version"
          cache: true
          run-install: false

      - uses: ./.github/actions/setup-moonbit

      - name: Install JS dependencies
        run: vp install --frozen-lockfile --prefer-offline

      - name: Build Vize CLI
        run: cargo build --release -p vize

      - name: Build native package
        run: vp run --workspace-root build:native

      - name: Build Vite plugin package
        run: vp run --workspace-root build:vite-plugin

      - name: Build Nuxt package stack
        run: vp run --workspace-root build:nuxt-stack

      - name: Generate benchmark input
        run: node bench/generate.mjs "$VIZE_TOOL_BENCH_FILE_COUNT"

      - name: Compare Vize with existing tools
        run: |
          node bench/compare-tools.mjs \
            --input bench/__in__ \
            --vize-bin target/release/vize \
            --runs "$VIZE_TOOL_BENCH_RUNS" \
            --warmups "$VIZE_TOOL_BENCH_WARMUPS" \
            --check-file-count "$VIZE_TOOL_BENCH_CHECK_FILE_COUNT" \
            --vite-file-count "$VIZE_TOOL_BENCH_VITE_FILE_COUNT" \
            --nuxt-file-count "$VIZE_TOOL_BENCH_NUXT_FILE_COUNT" \
            --large-blocks "$VIZE_TOOL_BENCH_LARGE_BLOCKS" \
            --runner-label "ubuntu-latest" \
            --commit "${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}" \
            --ref "${{ github.ref_name }}" \
            --repository "${{ github.repository }}" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --out tool-benchmark-summary.md \
            --json tool-benchmark-results.json \
            --doc performance-blacksmith.md

      - name: Write job summary
        run: cat tool-benchmark-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload tool benchmark results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tool-benchmark
          path: |
            tool-benchmark-summary.md
            tool-benchmark-results.json
            performance-blacksmith.md
          if-no-files-found: error
          retention-days: 30

  tool-benchmark-comment:
    name: tool-benchmark-comment
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
    needs:
      - tool-benchmark
    permissions:
      actions: read
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout trusted base
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.base.sha }}

      - name: Download tool benchmark results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: tool-benchmark

      - name: Comment on PR
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BENCHMARK_COMMENT_KEY: tool-${{ github.event.pull_request.head.sha }}
        run: node bench/comment-pr.mjs --body tool-benchmark-summary.md --comment-key "$BENCHMARK_COMMENT_KEY"

  tool-benchmark-commit:
    name: tool-benchmark-commit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.commit_results && startsWith(github.ref, 'refs/heads/') && github.ref_name != 'main' }}
    needs:
      - tool-benchmark
    permissions:
      actions: read
      contents: write
    steps:
      - name: Checkout benchmark branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.ref_name }}

      - name: Run voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.3.2
        with:
          node-version-file: .node-version
          cache: true
          run-install: false

      - name: Install JS dependencies
        run: vp install --frozen-lockfile --prefer-offline

      - name: Download tool benchmark results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: tool-benchmark
          path: tool-benchmark-artifact

      - name: Commit benchmark snapshot
        run: |
          mkdir -p docs/content/architecture bench/results
          cp tool-benchmark-artifact/performance-blacksmith.md docs/content/architecture/performance-blacksmith.md
          cp tool-benchmark-artifact/tool-benchmark-results.json bench/results/tool-benchmark-latest.json
          vp check --fix docs/content/architecture/performance-blacksmith.md bench/results/tool-benchmark-latest.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/content/architecture/performance-blacksmith.md bench/results/tool-benchmark-latest.json
          if git diff --cached --quiet; then
            echo "No benchmark snapshot changes to commit."
          else
            git commit -m "docs: update blacksmith benchmark snapshot"
            git push origin HEAD:${{ github.ref_name }}
          fi
