packages:
  - "playground"
  - "npm/*"
  - "npm/builder/*"
  - "editors/*"
  - "npm/framework/*"
  - "!editors/vscode-art"
  - "!editors/vscode"
  - "npm/builder/vite/example"
  - "npm/builder/rspack/example"
  - "npm/fresco/examples/*"
  - "examples/vite-musea"
  - "examples/oxlint-vize"
  - "examples/jsx-tsx"
  - "docs"
  - "tests"
  - "bench"

catalogs:
  # Shared repo and file-system utilities.
  repo-tooling:
    "@iarna/toml": "2.2.5"
    "@pkl-community/pkl": "0.30.2"
    glob: "13.0.6"
    json-schema-to-typescript: "15.0.4"
    pkg-pr-new: "0.0.73"
    prettier: "3.8.3"
    tinyglobby: "0.2.16"

  # TypeScript toolchain shared across workspace packages.
  typescript:
    "@types/node": "25.9.2"
    "@typescript/native-preview": "7.0.0-dev.20260602.1"
    tsx: "4.22.4"
    typescript: "6.0.3"
    vue-tsc: "3.3.4"

  # Vite / Vite Plus stack and adjacent build-time plugins.
  vite-stack:
    vite: https://pkg.pr.new/voidzero-dev/vite-plus/@voidzero-dev/vite-plus-core@dca39038de6ca46e523bf64dc09bf100b636eea9
    vitest: 4.1.9
    vite-plus: https://pkg.pr.new/voidzero-dev/vite-plus@dca39038de6ca46e523bf64dc09bf100b636eea9
    "@vitejs/plugin-vue": "6.0.7"
    vite-node: "6.0.0"
    vite-plugin-inspect: "11.4.1"
    unplugin: "3.0.0"

  # Stable Vue ecosystem packages used by shipping examples and integrations.
  vue-stable:
    vue: "3.5.35"
    "@vue/runtime-core": "3.5.35"
    "@vue/test-utils": "2.4.10"
    vue-router: "4.5.1"

  # Vue beta track used by the playground and benchmark harnesses.
  vue-beta:
    vue: "3.6.0-beta.10"
    "@vue/compiler-sfc": "3.6.0-beta.10"
    "@vue/compiler-vapor": "3.6.0-beta.10"

  # Test runners and browser automation.
  testing:
    "@playwright/test": "1.60.0"
    playwright: "1.60.0"

  # Lint and formatting toolchain.
  linting:
    "@oxlint/plugins": "1.64.0"

  # Bundlers beyond the Vite stack.
  bundlers:
    "@rspack/cli": "2.0.3"
    "@rspack/core": "2.0.3"
    esbuild: "0.28.1"
    rollup: "4.61.1"
    webpack: "5.107.2"

  # External framework integrations and native build helpers.
  integrations:
    "@modelcontextprotocol/sdk": "1.29.0"
    "@napi-rs/cli": "3.6.2"
    "@nuxt/kit": "4.4.8"
    "@ox-content/vite-plugin": "2.68.0"

  # Runtime kit loaded by @vizejs/nuxt. Keep this aligned with Nuxt 2 Bridge's
  # kit line so Nuxt 2's module loader does not pull in Nuxt 4-only syntax.
  nuxt-module:
    "@nuxt/kit": "3.11.2"

  # Rendering / content tooling used by docs, playgrounds, and galleries.
  content:
    "@mdi/js": "7.4.47"
    "@tsdown/css": "0.22.0"
    "@types/pngjs": "6.0.5"
    highlight.js: "11.11.1"
    marked: "18.0.5"
    marked-highlight: "2.2.4"
    monaco-editor: "0.55.1"
    pngjs: "7.0.0"
    shiki: "4.0.2"
    three: "0.184.0"

  # JS-side OXC transform bridge.
  oxc:
    oxc-transform: "0.130.0"

  # Published native binary packages that are installed optionally at runtime.
  native-binaries:
    "@vizejs/native-darwin-arm64": "0.262.0"
    "@vizejs/native-darwin-x64": "0.262.0"
    "@vizejs/native-linux-arm64-gnu": "0.262.0"
    "@vizejs/native-linux-arm64-musl": "0.262.0"
    "@vizejs/native-linux-x64-gnu": "0.262.0"
    "@vizejs/native-linux-x64-musl": "0.262.0"
    "@vizejs/native-win32-arm64-msvc": "0.262.0"
    "@vizejs/native-win32-x64-msvc": "0.262.0"

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
onlyBuiltDependencies:
  - esbuild
overrides:
  "@azure/msal-node>uuid": 11.1.1
  "@unhead/vue": 2.1.15
  defu: 6.1.7
  devalue: 5.8.1
  dompurify: 3.4.11
  esbuild: 0.28.1
  h3: 1.15.11
  hono: 4.12.25
  launch-editor: 2.14.1
  nanotar: 0.3.0
  nitropack: 2.13.4
  node-forge: 1.4.0
  nuxt: 4.4.8
  qs: 6.15.2
  shell-quote: 1.8.4
  simple-git: 3.36.0
  srvx: 0.11.15
  svgo: 4.0.1
  tar: 7.5.16
  vite@>=7.0.0 <7.3.5: 7.3.5
  yaml: 2.9.0
  vite: "catalog:"
  vitest: "catalog:"
  vite-plus: https://pkg.pr.new/voidzero-dev/vite-plus@dca39038de6ca46e523bf64dc09bf100b636eea9
catalog:
  vite: https://pkg.pr.new/voidzero-dev/vite-plus/@voidzero-dev/vite-plus-core@dca39038de6ca46e523bf64dc09bf100b636eea9
  vitest: 4.1.9
  vite-plus: https://pkg.pr.new/voidzero-dev/vite-plus@dca39038de6ca46e523bf64dc09bf100b636eea9
blockExoticSubdeps: false
