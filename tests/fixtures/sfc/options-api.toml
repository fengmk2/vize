[[cases]]
name = "props object form with defaults"
input = """
<script>
export default {
  props: {
    title: String,
    count: {
      type: Number,
      default: 0,
      required: false
    },
    items: {
      type: Array,
      default() {
        return []
      }
    }
  }
}
</script>

<template>
  <div>{{ title }}: {{ count }} ({{ items.length }})</div>
</template>
"""

[[cases]]
name = "emits with template emit"
input = """
<script>
export default {
  emits: ['submit', 'cancel'],
  data() {
    return { value: '' }
  }
}
</script>

<template>
  <form @submit.prevent="$emit('submit', value)">
    <button type="button" @click="$emit('cancel')">Cancel</button>
  </form>
</template>
"""

