[[cases]]
name = "directive with full hooks"
input = """
<script>
export default {
  directives: {
    color: {
      mounted(el, binding) {
        el.style.color = binding.value
      },
      updated(el, binding) {
        el.style.color = binding.value
      }
    }
  },
  data() {
    return { tint: 'red' }
  }
}
</script>

<template>
  <p v-color="tint">text</p>
</template>
"""

