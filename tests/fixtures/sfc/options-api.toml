[[cases]]
name = "v-if with computed condition"
input = """
<script>
export default {
  data() {
    return { count: 0 }
  },
  computed: {
    isEmpty() {
      return this.count === 0
    }
  }
}
</script>

<template>
  <div>
    <p v-if="isEmpty">empty</p>
    <p v-else>{{ count }}</p>
  </div>
</template>
"""

[[cases]]
name = "define component options api ts"
input = """
<script lang="ts">
import { defineComponent } from 'vue'

export default defineComponent({
  data() {
    return { count: 0 as number }
  },
  computed: {
    doubled(): number {
      return this.count * 2
    }
  }
})
</script>

<template>
  <div>{{ doubled }}</div>
</template>
"""

[[cases]]
name = "props with prop type typescript"
input = """
<script lang="ts">
import { defineComponent, PropType } from 'vue'

interface Item {
  id: number
  label: string
}

export default defineComponent({
  props: {
    items: {
      type: Array as PropType<Item[]>,
      default: () => []
    }
  }
})
</script>

<template>
  <div>{{ items.length }}</div>
</template>
"""

