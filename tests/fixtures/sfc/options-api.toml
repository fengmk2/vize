[[cases]]
name = "provide and inject"
input = """
<script>
export default {
  provide() {
    return { theme: this.theme }
  },
  inject: {
    parentTheme: { from: 'theme', default: 'light' }
  },
  data() {
    return { theme: 'dark' }
  }
}
</script>

<template>
  <div>{{ parentTheme }}</div>
</template>
"""

[[cases]]
name = "setup function with options api"
input = """
